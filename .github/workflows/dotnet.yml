# This workflow will build a .NET project
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-net

name: .NET

on:
  push:
    branches: [ "dev/githubPipeline" ]
  pull_request:
    branches: [ "dev/githubPipeline" ]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3
    - name: Setup .NET
      uses: actions/setup-dotnet@v3
      with:
        dotnet-version: 6.0.x
    - name: Restore dependencies
      run: dotnet restore
    - name: Build
      run: dotnet build --no-restore
    - name: Copy file
        # You may pin to the exact commit or the version.
        # uses: canastro/copy-action@7ddff6fc153a2ea2cd0fb88ed9750544c051e399
      uses: canastro/copy-action@0.0.2
      with:
        # Source file
        source: ${GITHUB_WORKSPACE}/Kuaminika.KobFlow.Merchant.Test/testconfig_sample.json
         # Target file
        target: ${GITHUB_WORKSPACE}/Kuaminika.KobFlow.Merchant.Test/testconfig.json
    - name: Test
      run: dotnet test --no-build --verbosity normal
